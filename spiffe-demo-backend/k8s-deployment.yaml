apiVersion: apps/v1
kind: Deployment
metadata:
  name: spiffe-demo-backend
  namespace: sandbox
  labels:
    app: spiffe-demo-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spiffe-demo-backend
  template:
    metadata:
      labels:
        app: spiffe-demo-backend
    spec:
      serviceAccountName: spiffe-demo-backend
      containers:
        - name: backend
          image: spiffe-demo-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: spiffe-csi
              mountPath: /var/run/secrets/spiffe.io
              readOnly: true
          env:
            - name: NODE_ENV
              value: "production"
            - name: CERBOS_HOST
              value: "cerbos-service:3593"
      volumes:
        - name: spiffe-csi
          csi:
            driver: spiffe.csi.cert-manager.io
            readOnly: true
            volumeAttributes:
              spiffe.csi.cert-manager.io/fs-group: "1000"
---
apiVersion: v1
kind: Service
metadata:
  name: spiffe-demo-backend-service
  namespace: sandbox
spec:
  selector:
    app: spiffe-demo-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spiffe-demo-backend-ingress
  namespace: sandbox
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: spiffe-backend.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spiffe-demo-backend-service
                port:
                  number: 80
