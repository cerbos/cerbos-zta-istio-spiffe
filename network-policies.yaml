apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-default-deny-ingress
  namespace: sandbox
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: spiffe-demo-app-allow-ingress
  namespace: sandbox
spec:
  podSelector:
    matchLabels:
      app: spiffe-demo-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8080
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - port: 8080
          protocol: TCP
    - from:
        - podSelector: {}
      ports:
        - port: 8080
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: spiffe-demo-backend-allow-ingress
  namespace: sandbox
spec:
  podSelector:
    matchLabels:
      app: spiffe-demo-backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8080
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - port: 8080
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              app: spiffe-demo-app
      ports:
        - port: 8080
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cerbos-allow-ingress
  namespace: sandbox
spec:
  podSelector:
    matchLabels:
      app: cerbos
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 3592
          protocol: TCP
        - port: 3593
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              app: spiffe-demo-backend
      ports:
        - port: 3592
          protocol: TCP
        - port: 3593
          protocol: TCP
