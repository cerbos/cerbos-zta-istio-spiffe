---
apiVersion: api.cerbos.dev/v1
principalPolicy:
  version: "default"
  principal: "*"
  rules:
    - resource: "*"
      actions:
        - name: "*"
          action: "*"
          effect: EFFECT_ALLOW
      condition:
        match:
          expr: |
            has(P.attr.spiffe_id) && 
            P.attr.spiffe_id.startsWith("spiffe://demo.cerbos.io/admin/")
      
    - resource: "document"
      actions:
        - name: "read_any"
          action: "read"
          effect: EFFECT_ALLOW
      condition:
        match:
          expr: |
            has(P.attr.spiffe_id) && 
            P.attr.spiffe_id.startsWith("spiffe://demo.cerbos.io/service/")
            
    - resource: "*"  
      actions:
        - name: "audit_log"
          action: "*"
          effect: EFFECT_ALLOW
      condition:
        match:
          expr: |
            has(P.attr.spiffe_id) && 
            P.attr.spiffe_id.contains("/audit/")
      output:
        when:
          ruleActivated: '{"audit": true, "spiffe_id": P.attr.spiffe_id, "timestamp": now()}'