apiVersion: apps/v1
kind: Deployment
metadata:
  name: spiffe-demo-app
  namespace: sandbox
  labels:
    app: spiffe-demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spiffe-demo-app
  template:
    metadata:
      labels:
        app: spiffe-demo-app
    spec:
      serviceAccountName: spiffe-demo-app
      containers:
        - name: app
          image: spiffe-demo-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: spiffe-csi
              mountPath: /var/run/secrets/spiffe.io
              readOnly: true
          env:
            - name: NODE_ENV
              value: "production"
      volumes:
        - name: spiffe-csi
          csi:
            driver: spiffe.csi.cert-manager.io
            readOnly: true
            volumeAttributes:
              spiffe.csi.cert-manager.io/fs-group: "1000"
---
apiVersion: v1
kind: Service
metadata:
  name: spiffe-demo-app-service
  namespace: sandbox
spec:
  selector:
    app: spiffe-demo-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: spiffe-demo-app
  namespace: sandbox
spec:
  hosts:
    - spiffe-demo.local
  gateways:
    - spiffe-demo-gateway
  http:
    - route:
        - destination:
            host: spiffe-demo-app-service.sandbox.svc.cluster.local
            port:
              number: 80
