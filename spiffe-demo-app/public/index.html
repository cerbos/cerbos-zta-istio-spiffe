<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPIFFE Cerbos Authorization Demo</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a1a;
            color: #00ff00;
        }
        .container {
            background: #000;
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #00ff00;
        }
        .status {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
        }
        .allowed {
            background: rgba(0, 255, 0, 0.1);
            border-left: 4px solid #00ff00;
        }
        .denied {
            background: rgba(255, 0, 0, 0.1);
            border-left: 4px solid #ff0000;
            color: #ff0000;
        }
        .log-entry {
            font-size: 12px;
            margin: 5px 0;
            padding: 5px;
            background: rgba(255, 255, 255, 0.05);
        }
        .timestamp {
            color: #888;
        }
        .control-panel {
            text-align: center;
            margin: 20px 0;
        }
        button {
            background: #333;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
        }
        button:hover {
            background: #444;
        }
        #log-container {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 10px;
            background: #111;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 SPIFFE + Cerbos Authorization Demo</h1>
        
        <div class="status" id="current-status">
            <strong>Status:</strong> <span id="status-text">Starting...</span>
        </div>
        
        <div class="control-panel">
            <button onclick="togglePolling()">Start/Stop Polling</button>
            <button onclick="clearLog()">Clear Log</button>
            <button onclick="testOnce()">Test Once</button>
        </div>
        
        <div class="container">
            <h3>Authorization Log</h3>
            <div id="log-container"></div>
        </div>
    </div>

    <script>
        let pollingInterval = null;
        let isPolling = false;
        
        function addLogEntry(message, isAllowed) {
            const logContainer = document.getElementById('log-container');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry ${isAllowed ? 'allowed' : 'denied'}`;
            entry.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${message}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }
        
        function updateStatus(message, isAllowed) {
            const statusEl = document.getElementById('current-status');
            const statusText = document.getElementById('status-text');
            statusText.textContent = message;
            statusEl.className = `status ${isAllowed ? 'allowed' : 'denied'}`;
        }
        
        async function testBackendAuthorization() {
            try {
                const response = await fetch('/api/test-authorization', {
                    method: 'GET'
                });
                
                const result = await response.json();
                
                if (result.success && result.status === 200) {
                    const spiffeId = result.data.spiffeId || 'unknown';
                    const message = `✅ ALLOWED - Backend authorized request (SPIFFE: ${spiffeId})`;
                    addLogEntry(message, true);
                    updateStatus('Authorization: ALLOWED', true);
                    return true;
                } else if (result.status === 403) {
                    const errorMsg = result.data?.error || 'Access denied';
                    const message = `❌ DENIED - Backend rejected request (${errorMsg})`;
                    addLogEntry(message, false);
                    updateStatus('Authorization: DENIED', false);
                    return false;
                } else if (result.error) {
                    const message = `💥 ERROR - ${result.error}`;
                    addLogEntry(message, false);
                    updateStatus('Network/Service Error', false);
                    return false;
                } else {
                    const message = `⚠️ ERROR - HTTP ${result.status}: ${result.statusText}`;
                    addLogEntry(message, false);
                    updateStatus(`Error: HTTP ${result.status}`, false);
                    return false;
                }
            } catch (error) {
                const message = `💥 NETWORK ERROR - ${error.message}`;
                addLogEntry(message, false);
                updateStatus('Network Error', false);
                return false;
            }
        }
        
        function togglePolling() {
            if (isPolling) {
                clearInterval(pollingInterval);
                pollingInterval = null;
                isPolling = false;
                addLogEntry('🛑 Polling stopped', true);
                updateStatus('Polling stopped', true);
            } else {
                pollingInterval = setInterval(testBackendAuthorization, 3000);
                isPolling = true;
                addLogEntry('🚀 Polling started (every 3 seconds)', true);
                updateStatus('Polling active', true);
                // Test immediately
                testBackendAuthorization();
            }
        }
        
        function clearLog() {
            document.getElementById('log-container').innerHTML = '';
            addLogEntry('📋 Log cleared', true);
        }
        
        function testOnce() {
            addLogEntry('🔍 Manual test triggered', true);
            testBackendAuthorization();
        }
        
        // Initialize
        addLogEntry('🔧 SPIFFE Cerbos Authorization Demo initialized', true);
        addLogEntry('💡 Click "Start/Stop Polling" to begin testing authorization', true);
        addLogEntry('🎯 Demo: Change Cerbos policies to see requests succeed or fail', true);
        updateStatus('Ready - Click Start/Stop Polling to begin', true);
    </script>
</body>
</html>
